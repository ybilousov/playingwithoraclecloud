services:
  # ===== Nginx Proxy Manager =====
  app:
    image: '${NPM_IMAGE:-jc21/nginx-proxy-manager:latest}'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '${HTTP_PORT}:80' # Public HTTP Port
      - '${HTTPS_PORT}:443' # Public HTTPS Port
      - '${ADMIN_PORT}:81' # Admin Web Port
    environment:
      DB_MYSQL_HOST: "${DB_MYSQL_HOST}"
      DB_MYSQL_PORT: ${DB_MYSQL_PORT}
      DB_MYSQL_USER: "${DB_MYSQL_USER}"
      DB_MYSQL_PASSWORD: "${DB_MYSQL_PASSWORD}"
      DB_MYSQL_NAME: "${DB_MYSQL_NAME}"
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    depends_on:
      db:
        condition: service_healthy

  # ===== Nginx Proxy Manager Database =====
  db:
    image: '${DB_IMAGE:-jc21/mariadb-aria:latest}'
    container_name: npm-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - ./mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== WordPress Shared Database =====
  shared_db:
    image: '${WP_DB_IMAGE:-mariadb:10.11}'
    container_name: wordpress_shared_db
    restart: always
    volumes:
      - shared_db_data:/var/lib/mysql
      - ./shared_db_init:/docker-entrypoint-initdb.d:ro
    environment:
      MARIADB_ROOT_PASSWORD: "${WP_DB_ROOT_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$WP_DB_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== WordPress Site 1 =====
  site1:
    image: '${WP_IMAGE:-wordpress:latest}'
    container_name: wp_site_1
    restart: always
    ports:
      - "${WP_SITE1_PORT}:80"
    depends_on:
      shared_db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: shared_db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: "${WP_DB_ROOT_PASSWORD}"
      WORDPRESS_DB_NAME: ${WP_SITE1_DB_NAME}
    command: sh -c "sleep ${WP_START_DELAY:-15} && docker-entrypoint.sh apache2-foreground"
    volumes:
      - wp_site1_data:/var/www/html

  # ===== WordPress Site 2 =====
  site2:
    image: '${WP_IMAGE:-wordpress:latest}'
    container_name: wp_site_2
    restart: always
    ports:
      - "${WP_SITE2_PORT}:80"
    depends_on:
      shared_db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: shared_db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: "${WP_DB_ROOT_PASSWORD}"
      WORDPRESS_DB_NAME: ${WP_SITE2_DB_NAME}
    command: sh -c "sleep ${WP_START_DELAY:-15} && docker-entrypoint.sh apache2-foreground"
    volumes:
      - wp_site2_data:/var/www/html

  # ===== WordPress Site 3 =====
  site3:
    image: '${WP_IMAGE:-wordpress:latest}'
    container_name: wp_site_3
    restart: always
    ports:
      - "${WP_SITE3_PORT}:80"
    depends_on:
      shared_db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: shared_db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: "${WP_DB_ROOT_PASSWORD}"
      WORDPRESS_DB_NAME: ${WP_SITE3_DB_NAME}
    command: sh -c "sleep ${WP_START_DELAY:-15} && docker-entrypoint.sh apache2-foreground"
    volumes:
      - wp_site3_data:/var/www/html

  # ===== WordPress Site 4 =====
  site4:
    image: '${WP_IMAGE:-wordpress:latest}'
    container_name: wp_site_4
    restart: always
    ports:
      - "${WP_SITE4_PORT}:80"
    depends_on:
      shared_db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: shared_db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: "${WP_DB_ROOT_PASSWORD}"
      WORDPRESS_DB_NAME: ${WP_SITE4_DB_NAME}
    command: sh -c "sleep ${WP_START_DELAY:-15} && docker-entrypoint.sh apache2-foreground"
    volumes:
      - wp_site4_data:/var/www/html

volumes:
  shared_db_data:
  wp_site1_data:
  wp_site2_data:
  wp_site3_data:
  wp_site4_data: